name: Build

# Verifies the app compiles on macOS, Windows AND Linux on every push (proving
# the cross-platform claim), and produces downloadable installers as artifacts.
# Pushing a v* tag additionally publishes a draft GitHub Release with them.
#
# NOTE: Linux artifacts are BUILD-verified only. CI proves they compile and
# bundle (.deb / .rpm / .AppImage) — NOT that the transparent, always-on-top,
# click-through overlay behaves at runtime. That is reliable on X11 and
# unverified on Wayland, and needs a real desktop to confirm. See HANDOVER.md §12.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            rust-target: ""
            args: ""
          # Pinned to 22.04 (not -latest): the AppImage links against the
          # runner's glibc, and building on the oldest supported Ubuntu keeps
          # the artifact runnable on more distros.
          - platform: ubuntu-22.04
            rust-target: ""
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Tauri v2 on Linux needs webkit2gtk-4.1 + the appindicator/rsvg stack;
      # patchelf is required to bundle the .AppImage. Only runs on the Ubuntu leg.
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential curl wget file libxdo-dev libssl-dev libgtk-3-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build & (on tags) release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "Claude Code Pet ${{ github.ref_name }}"
          releaseBody: "Download the installer for your OS below (macOS `.dmg`, Windows `.msi` / `.exe`, Linux `.AppImage` / `.deb` / `.rpm`)."
          releaseDraft: true
          prerelease: false

      - name: Upload build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-pet-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app/**
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
            src-tauri/target/**/release/bundle/**/*.nsis.zip
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage
