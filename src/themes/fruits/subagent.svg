<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Banana body -->
  <path d="M22 58 Q18 40 28 24 Q36 14 44 16 Q52 18 50 28 Q46 44 56 58" stroke="#f1c40f" stroke-width="0" fill="#f1c40f"/>
  <defs>
    <radialGradient id="bananaShine" cx="40%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <path d="M22 58 Q18 40 28 24 Q36 14 44 16 Q52 18 50 28 Q46 44 56 58" fill="url(#bananaShine)"/>
  <!-- Stem -->
  <path d="M44 16 Q46 12 50 10" stroke="#8d6e3f" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Brown tip -->
  <ellipse cx="24" cy="58" rx="4" ry="3" fill="#8d6e3f" transform="rotate(-10 24 58)"/>
  <!-- Eyes (focused, busy) -->
  <ellipse cx="33" cy="36" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="34" cy="36.5" rx="1.5" ry="2" fill="#2d3436"/>
  <circle cx="35" cy="35.5" r="0.8" fill="white"/>
  <ellipse cx="45" cy="34" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="46" cy="34.5" rx="1.5" ry="2" fill="#2d3436"/>
  <circle cx="47" cy="33.5" r="0.8" fill="white"/>
  <!-- Determined mouth -->
  <path d="M35 44 Q39 47 43 44" stroke="#2d3436" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Motion lines (busy) -->
  <line x1="12" y1="36" x2="8" y2="34" stroke="#e67e22" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="42" x2="7" y2="42" stroke="#e67e22" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="48" x2="8" y2="50" stroke="#e67e22" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="66" y1="36" x2="70" y2="34" stroke="#e67e22" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="66" y1="42" x2="71" y2="42" stroke="#e67e22" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="66" y1="48" x2="70" y2="50" stroke="#e67e22" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
