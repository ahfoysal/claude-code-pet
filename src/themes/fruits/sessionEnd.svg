<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Kiwi body (cut half) -->
  <circle cx="40" cy="44" r="24" fill="#8d6e3f"/>
  <circle cx="40" cy="44" r="21" fill="#a3cb38"/>
  <defs>
    <radialGradient id="kiwiShine" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#c8e66e" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#a3cb38" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="40" cy="44" r="21" fill="url(#kiwiShine)"/>
  <!-- Center -->
  <ellipse cx="40" cy="44" rx="4" ry="5" fill="#c8e66e"/>
  <!-- Seed pattern -->
  <ellipse cx="34" cy="36" rx="1" ry="2" fill="#2d3436" opacity="0.5" transform="rotate(-30 34 36)"/>
  <ellipse cx="46" cy="36" rx="1" ry="2" fill="#2d3436" opacity="0.5" transform="rotate(30 46 36)"/>
  <ellipse cx="30" cy="44" rx="1" ry="2" fill="#2d3436" opacity="0.5"/>
  <ellipse cx="50" cy="44" rx="1" ry="2" fill="#2d3436" opacity="0.5"/>
  <ellipse cx="34" cy="52" rx="1" ry="2" fill="#2d3436" opacity="0.5" transform="rotate(30 34 52)"/>
  <ellipse cx="46" cy="52" rx="1" ry="2" fill="#2d3436" opacity="0.5" transform="rotate(-30 46 52)"/>
  <!-- Sleepy eyes (- -) -->
  <line x1="30" y1="42" x2="38" y2="42" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="42" x2="50" y2="42" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
  <!-- Sleepy mouth -->
  <path d="M37 50 Q40 52 43 50" stroke="#2d3436" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Zzz -->
  <text x="54" y="28" font-size="10" fill="#2d3436" font-family="sans-serif" font-weight="bold" opacity="0.6">z</text>
  <text x="60" y="20" font-size="12" fill="#2d3436" font-family="sans-serif" font-weight="bold" opacity="0.4">z</text>
  <text x="65" y="12" font-size="8" fill="#2d3436" font-family="sans-serif" font-weight="bold" opacity="0.3">z</text>
</svg>
